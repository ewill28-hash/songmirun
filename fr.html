<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songmirun Logs - Runner Grade Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">

        const SUPABASE_URL = 'https://bwzvgqcfydznuwugyyio.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3enZncWNmeWR6bnV3dWd5eWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU2MjcsImV4cCI6MjA4ODk1MTYyN30.SqQJ7w-SsPnm1wN03USOaR6_Fdn0JBzLn8tPhFYJWj8';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const userListElement = document.getElementById('user-list');
        const loadingElement = document.getElementById('loading');
        const countElement = document.getElementById('user-count');
        
        const totalDistanceElement = document.getElementById('total-stats-distance');
        const totalCountElement = document.getElementById('total-stats-count');
        
        const yearSelect = document.getElementById('year-filter');
        const monthSelect = document.getElementById('month-filter');
        const sortSelect = document.getElementById('sort-filter');
        
        let allLogs = []; 
        let allMembers = [];
        let currentSortedData = [];

        // --- 등급 기준 정의 ---
        const thresholds = [
            { threshold: 100, name: '🍃 바람', color: 'bg-white text-blue-600 border border-blue-200' },
            { threshold: 90, name: '🏵️ 만개', color: 'bg-purple-500 text-white' },
            { threshold: 70, name: '🌺 열정', color: 'bg-orange-500 text-white' },
            { threshold: 50, name: '🌼 활짝', color: 'bg-blue-500 text-white' },
            { threshold: 30, name: '🌷 꽃봉', color: 'bg-green-500 text-white' },
            { threshold: 1, name: '🌱 새싹', color: 'bg-green-100 text-green-600 border border-green-200' },
            { threshold: 0, name: '🌰 씨앗', color: 'bg-amber-100 text-amber-700 border border-amber-200' }
        ];

        // --- 등급 계산 로직 ---
        const calculateRunnerGradeAtDate = (userLogs, targetDate) => {
            const thirtyOneDaysAgo = new Date(targetDate);
            thirtyOneDaysAgo.setDate(targetDate.getDate() - 31);

            const recentLogs = userLogs.filter(l => {
                if (!l.jsDate) return false;
                return l.jsDate >= thirtyOneDaysAgo && l.jsDate <= targetDate;
            });

            const count = recentLogs.length;
            let scoreCount = 0;
            if (count >= 30) scoreCount = 40;
            else if (count >= 20) scoreCount = 37;
            else if (count >= 18) scoreCount = 35;
            else if (count >= 16) scoreCount = 30;
            else if (count >= 12) scoreCount = 25;
            else if (count >= 8) scoreCount = 20;
            else if (count >= 4) scoreCount = 15;
            else if (count >= 2) scoreCount = 10;
            else if (count >= 1) scoreCount = 5;
            else scoreCount = 0;

            const dist = recentLogs.reduce((sum, l) => sum + Number(l.distance || 0), 0);
            let scoreDist = 0;
            if (dist >= 300) scoreDist = 40;
            else if (dist >= 200) scoreDist = 38;
            else if (dist >= 150) scoreDist = 35;
            else if (dist >= 100) scoreDist = 30;
            else if (dist >= 50) scoreDist = 25;
            else if (dist >= 20) scoreDist = 20;
            else if (dist >= 15) scoreDist = 15;
            else if (dist >= 10) scoreDist = 10;
            else if (dist >= 5) scoreDist = 5;
            else scoreDist = 0;
            
            const weekActive = [false, false, false, false];
            for(let i=0; i<4; i++) {
                const start = new Date(targetDate);
                start.setDate(targetDate.getDate() - (i + 1) * 7);
                const end = new Date(targetDate);
                end.setDate(targetDate.getDate() - i * 7);
                const weeklyCount = userLogs.filter(l => l.jsDate >= start && l.jsDate < end).length;
                if(weeklyCount >= 2) weekActive[i] = true;
            }
            const activeWeeks = weekActive.filter(x => x).length;
            let scoreBonus = 0;
            if (activeWeeks === 4) scoreBonus = 20;
            else if (activeWeeks === 3) scoreBonus = 15;
            else if (activeWeeks === 2) scoreBonus = 10;
            else if (activeWeeks === 1) scoreBonus = 5;
            else scoreBonus = 0;

            const totalScore = scoreCount + scoreDist + scoreBonus;
            const currentIdx = thresholds.findIndex(t => totalScore >= t.threshold);
            
            return { 
                ...thresholds[currentIdx], 
                score: totalScore,
                details: { scoreCount, count, scoreDist, dist, scoreBonus, activeWeeks, totalScore }
            };
        };

        const calculateGradeDuration = (userLogs) => {
            const now = new Date();
            const currentGrade = calculateRunnerGradeAtDate(userLogs, now);
            
            let durationDays = 0;
            let checkDate = new Date(now);
            
            for (let i = 1; i <= 90; i++) {
                checkDate.setDate(checkDate.getDate() - 1);
                const prevGrade = calculateRunnerGradeAtDate(userLogs, checkDate);
                if (prevGrade.name === currentGrade.name) {
                    durationDays = i;
                } else {
                    break;
                }
            }
            
            return { ...currentGrade, durationDays };
        };

        async function initApp() {
            // 기본값을 현재 연도와 이번 달로 설정
            const today = new Date();
            const currentYear = today.getFullYear().toString();
            const currentMonth = (today.getMonth() + 1).toString();
            
            yearSelect.value = currentYear;
            monthSelect.value = currentMonth;

            await Promise.all([fetchMembers(), fetchLogs()]);
            setupRealtime();
        }

        async function fetchLogs() {
            loadingElement.classList.remove('hidden');
            let allFetchedLogs = [];
            let rangeStart = 0;
            const PAGE_SIZE = 1000;
            let isFinished = false;

            try {
                while (!isFinished) {
                    const { data, error } = await _supabase
                        .from('songmirun_logs')
                        .select('*')
                        .range(rangeStart, rangeStart + PAGE_SIZE - 1)
                        .order('created_at', { ascending: false });

                    if (error) break;

                    if (data && data.length > 0) {
                        const mappedData = data.map(item => ({
                            id: item.id,
                            userName: (item.user_name || 'Unknown').trim(),
                            distance: parseFloat(item.distance || 0),
                            duration: parseFloat(item.duration || 0),
                            jsDate: new Date(item.run_date || item.created_at),
                            updatedAt: new Date(item.updated_at || item.created_at)
                        }));
                        allFetchedLogs = [...allFetchedLogs, ...mappedData];
                        if (data.length < PAGE_SIZE) isFinished = true;
                        else rangeStart += PAGE_SIZE;
                    } else {
                        isFinished = true;
                    }
                }
                allLogs = allFetchedLogs;
                applyFilters();
            } catch (err) {
                console.error(err);
            } finally {
                loadingElement.classList.add('hidden');
            }
        }

        async function fetchMembers() {
            loadingElement.classList.remove('hidden');
            let allData = [];
            let rangeStart = 0;
            const PAGE_SIZE = 1000;
            let isFinished = false;

            try {
                while (!isFinished) {
                    const { data, error } = await _supabase
                        .from('songmirun_members')
                        .select('*')
                        .range(rangeStart, rangeStart + PAGE_SIZE - 1)
                        .order('id', { ascending: true });

                    if (error) break;
                    if (data && data.length > 0) {
                        allData = [...allData, ...data];
                        if (data.length < PAGE_SIZE) isFinished = true;
                        else rangeStart += PAGE_SIZE;
                    } else isFinished = true;
                }
                allMembers = allData;
                applyFilters();
            } catch (err) {
                console.error(err);
            } finally {
                loadingElement.classList.add('hidden');
            }
        }

        function setupRealtime() {
            _supabase
                .channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'songmirun_logs' }, () => fetchLogs())
                .on('postgres_changes', { event: '*', schema: 'public', table: 'songmirun_members' }, () => fetchMembers())
                .subscribe();
        }

        function applyFilters() {
            const selectedYear = yearSelect.value;
            const selectedMonth = monthSelect.value;
            const sortBy = sortSelect.value;
            
            const userData = {}; 
            let totalDistSum = 0;
            let totalCountSum = 0;

            allMembers.forEach(mem => {
                const nameKey = (mem.nickname || '').trim();
                if (!nameKey) return;
                const mUpdate = mem.updated_at || mem.created_at;
                userData[nameKey] = {
                    count: 0, totalDistance: 0, totalDuration: 0,
                    logUpdatedAt: null,
                    memberUpdatedAt: mUpdate ? new Date(mUpdate) : null,
                    personalLogs: [] 
                };
            });
            
            allLogs.forEach(log => {
                const nameKey = log.userName;
                const year = log.jsDate.getFullYear().toString();
                const month = (log.jsDate.getMonth() + 1).toString();
                
                if (userData[nameKey]) userData[nameKey].personalLogs.push(log);

                if (selectedYear !== 'all' && year !== selectedYear) return;
                if (selectedMonth !== 'all' && month !== selectedMonth) return;
                
                if (!userData[nameKey]) {
                    userData[nameKey] = { 
                        count: 0, totalDistance: 0, totalDuration: 0,
                        logUpdatedAt: log.updatedAt, memberUpdatedAt: null,
                        personalLogs: [log]
                    };
                }
                
                userData[nameKey].count += 1;
                userData[nameKey].totalDistance += log.distance; 
                userData[nameKey].totalDuration += log.duration; 
                if (!userData[nameKey].logUpdatedAt || log.updatedAt > userData[nameKey].logUpdatedAt) {
                    userData[nameKey].logUpdatedAt = log.updatedAt;
                }
                totalDistSum += log.distance;
                totalCountSum += 1;
            });

            let filteredUserList = Object.entries(userData).map(([name, stats]) => {
                stats.grade = calculateGradeDuration(stats.personalLogs);
                return [name, stats];
            }).filter(([name, stats]) => stats.totalDistance > 0);

            totalDistanceElement.innerText = totalDistSum.toFixed(2);
            totalCountElement.innerText = totalCountSum;

            currentSortedData = filteredUserList.sort((a, b) => {
                const statsA = a[1];
                const statsB = b[1];
                if (sortBy === 'distance') return statsB.totalDistance - statsA.totalDistance;
                if (sortBy === 'duration') return statsB.totalDuration - statsA.totalDuration; 
                if (sortBy === 'count') return statsB.count - statsA.count;
                if (sortBy === 'score') return statsB.grade.score - statsA.grade.score;
                return a[0].localeCompare(b[0]);
            });
            
            renderUsers(currentSortedData);
        }

        function renderUsers(usersWithData) {
            userListElement.innerHTML = '';
            countElement.innerText = `총 ${usersWithData.length}명`;

            if (usersWithData.length === 0) {
                userListElement.innerHTML = '<p class="text-slate-400 text-center py-10 font-medium italic">조건에 맞는 데이터가 없습니다.</p>';
                return;
            }

            usersWithData.forEach(([name, stats], i) => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between p-2 bg-white rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-all group";
                
                const grade = stats.grade;
                
                li.innerHTML = `
                    <div class="flex items-center">
                        <span class="text-xs font-black text-slate-500 w-6 mr-1 text-center">${i + 1}</span>
                        <div class="flex flex-col">
                            <div class="flex items-center space-x-1.5">
                                <span class="text-slate-800 font-bold uppercase tracking-tight leading-tight text-xs">${name}</span>
                            </div>
                            <div class="flex items-center space-x-1.5">
                                <div class="flex flex-col items-start">
                                    <span class="px-1.5 py-0.5 rounded text-[8px] font-black ${grade.color}">
                                        ${grade.name}
                                    </span>
                                </div>

                                <div class="flex flex-col items-start">
                                    <span class="text-[7px] text-slate-400 font-bold mt-0.5 leading-none">
                                        ${grade.durationDays > 0 ? grade.durationDays + '일째 유지 중' : '오늘 등급 달성'}
                                    </span>
                                </div>
                            </div>
                            <div class="flex items-center space-x-2 mt-0.5">
                                <span class="text-[9px] font-black text-emerald-600 bg-emerald-50 px-1 rounded">${grade.score}pt</span>
                                <div class="flex flex-col text-[8px] font-bold text-slate-400 uppercase leading-tight">
                                    <span>${grade.details.scoreCount}/${grade.details.scoreDist}/${grade.details.scoreBonus}</span>
                                    <span>(${grade.details.count}회 ${grade.details.dist.toFixed(1)}km ${grade.details.activeWeeks}주)</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col items-end space-y-1.5">
                        <div class="flex items-center space-x-2">
                            <div class="flex flex-col items-end">
                                <span class="text-[10px] text-slate-400 uppercase font-black leading-none">Dist</span>
                                <span class="text-sm font-black text-slate-700">${stats.totalDistance.toFixed(1)}<span class="text-[9px] ml-0.5">km</span></span>
                            </div>
                            <div class="flex flex-col items-end border-l border-slate-100 pl-2">
                                <span class="text-[10px] text-slate-400 uppercase font-black leading-none">Time</span>
                                <span class="text-sm font-black text-slate-700">${Math.floor(stats.totalDuration)}<span class="text-[9px] ml-0.5">min</span></span>
                            </div>
                            <div class="flex flex-col items-end border-l border-slate-100 pl-2">
                                <span class="text-[10px] text-slate-400 uppercase font-black leading-none">Count</span>
                                <span class="text-sm font-black text-emerald-600">${stats.count}<span class="text-[9px] ml-0.5">회</span></span>
                            </div>
                        </div>
                    </div>
                `;
                userListElement.appendChild(li);
            });
        }

        yearSelect.addEventListener('change', applyFilters);
        monthSelect.addEventListener('change', applyFilters);
        sortSelect.addEventListener('change', applyFilters);

        initApp();
    </script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 font-sans text-slate-900">
    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="bg-sky-500 rounded-t-2xl p-6 shadow-lg text-white">
            <div class="flex justify-between items-center mb-5">
                <h1 class="text-xl font-black flex items-center tracking-tight uppercase">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                    SongMission Flower Grade
                </h1>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white/10 rounded-xl p-3 border border-white/10">
                    <p class="text-[10px] font-black uppercase text-emerald-100 mb-1">Period Dist</p>
                    <div class="flex items-baseline">
                        <span id="total-stats-distance" class="text-2xl font-black">0.00</span>
                        <span class="text-[10px] ml-1 font-bold text-emerald-100 uppercase">km</span>
                    </div>
                </div>
                <div class="bg-white/10 rounded-xl p-3 border border-white/10">
                    <p class="text-[10px] font-black uppercase text-emerald-100 mb-1">Period Count</p>
                    <div class="flex items-baseline">
                        <span id="total-stats-count" class="text-2xl font-black">0</span>
                        <span class="text-[10px] ml-1 font-bold text-emerald-100 uppercase">run</span>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
                <div class="flex flex-col">
                    <label class="text-[10px] font-black uppercase mb-1 text-emerald-100">Period Filter</label>
                    <div class="flex space-x-1">
                        <select id="year-filter" class="flex-1 bg-sky-600 border-none rounded-lg text-[11px] font-bold p-2 text-white outline-none">
                            <option value="all">전체</option>
                            <option value="2024">24년</option>
                            <option value="2025">25년</option>
                            <option value="2026">26년</option>
                        </select>
                        <select id="month-filter" class="flex-1 bg-sky-600 border-none rounded-lg text-[11px] font-bold p-2 text-white outline-none">
                            <option value="all">전체</option>
                            <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
                            <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
                            <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
                            <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-black uppercase mb-1 text-emerald-100">Sorting</label>
                    <select id="sort-filter" class="bg-sky-600 border-none rounded-lg text-[11px] font-bold p-2 text-white outline-none">
                        <option value="score">등급 높은 순</option>
                        <option value="distance">거리 순</option>
                        <option value="duration">시간 순</option>
                        <option value="count">횟수 순</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-b-2xl shadow-xl p-5 min-h-[400px]">
            <p id="user-count" class="text-slate-400 text-[10px] font-black mb-4 uppercase tracking-widest border-b border-slate-50 pb-2">Initializing...</p>
            
            <div id="loading" class="text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-[3px] border-emerald-600 border-t-transparent rounded-full mb-3"></div>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Calculating Grades...</p>
            </div>

            <ul id="user-list" class="space-y-4"></ul>
        </div>
    </div>
</body>
</html>
