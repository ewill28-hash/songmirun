<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Songmirun Logs - Supabase Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        /**
         * [DB 연결 정보]
         * SUPABASE_URL: 프로젝트 API 엔드포인트
         * SUPABASE_ANON_KEY: 클라이언트용 공개 API 키
         */
        const SUPABASE_URL = 'https://bwzvgqcfydznuwugyyio.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3enZncWNmeWR6bnV3dWd5eWlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzU2MjcsImV4cCI6MjA4ODk1MTYyN30.SqQJ7w-SsPnm1wN03USOaR6_Fdn0JBzLn8tPhFYJWj8';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const userListElement = document.getElementById('user-list');
        const loadingElement = document.getElementById('loading');
        const countElement = document.getElementById('user-count');
        const modal = document.getElementById('rename-modal');
        const newNameInput = document.getElementById('new-name-input');
        
        const totalDistanceElement = document.getElementById('total-stats-distance');
        const totalCountElement = document.getElementById('total-stats-count');
        
        const yearSelect = document.getElementById('year-filter');
        const monthSelect = document.getElementById('month-filter');
        const sortSelect = document.getElementById('sort-filter');
        
        let currentEditingName = '';
        let allLogs = []; 
        let currentSortedData = [];

        // 앱 초기화 및 데이터 로드 시작
        async function initApp() {
            fetchLogs();
            setupRealtime();
        }

        async function fetchLogs() {
            loadingElement.classList.remove('hidden');
            
            /**
             * [테이블 참조] 
             * .from('songmirun_logs'): Supabase의 해당 테이블에서 모든 행을 조회
             */
            const { data, error } = await _supabase
                .from('songmirun_logs')
                .select('*');

            if (error) {
                console.error("Data load failed:", error);
                loadingElement.innerText = "데이터 로드 오류";
                return;
            }

            allLogs = data.map(item => {
                /**
                 * [필드 매핑]
                 * user_name: 사용자 이름 필드
                 * run_date: 운동 날짜 필드 (필터링 기준)
                 * distance: 운동 거리 필드
                 */
                const rawName = item.user_name || 'Unknown'; // 사용자 이름 필드 참조
                const rawDate = item.run_date || item.created_at || Date.now(); // 날짜 필드 참조
                
                return {
                    id: item.id,
                    userName: rawName.trim(), 
                    distance: parseFloat(item.distance || 0), // 거리 필드 참조 및 숫자 변환
                    jsDate: new Date(rawDate)
                };
            });

            applyFilters();
            loadingElement.classList.add('hidden');
        }

        // 실시간 업데이트 구독 설정
        function setupRealtime() {
            _supabase
                .channel('public:songmirun_logs')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'songmirun_logs' }, () => {
                    fetchLogs();
                })
                .subscribe();
        }

        window.openRenameModal = (oldName) => {
            currentEditingName = oldName;
            newNameInput.value = oldName;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            newNameInput.focus();
        };

        window.closeRenameModal = () => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };

        // 사용자 이름 일괄 수정 로직
        window.confirmRename = async () => {
            const newName = newNameInput.value.trim();
            if (!newName || newName === currentEditingName) {
                closeRenameModal();
                return;
            }

            closeRenameModal();
            loadingElement.classList.remove('hidden');
            loadingElement.innerText = "이름 변경 중...";

            /**
             * [데이터 업데이트]
             * 테이블: songmirun_logs
             * 필드: user_name (조합 조건 및 업데이트 대상)
             */
            const { error } = await _supabase
                .from('songmirun_logs')
                .update({ user_name: newName }) // 새 사용자 이름으로 업데이트
                .eq('user_name', currentEditingName); // 기존 이름과 일치하는 행 선택

            if (error) {
                console.error("Update failed:", error);
            }
            
            fetchLogs();
        };

        // 데이터 필터링 및 통계 계산 로직 (run_date와 distance 기반)
        function applyFilters() {
            const selectedYear = yearSelect.value;
            const selectedMonth = monthSelect.value;
            const sortBy = sortSelect.value;
            
            const userData = {}; 
            let totalDistSum = 0;
            let totalCountSum = 0;
            
            allLogs.forEach(log => {
                const nameKey = log.userName;
                if (!nameKey || isNaN(log.jsDate.getTime())) return;
                
                // [필터링 기준] run_date에서 추출한 년/월
                const year = log.jsDate.getFullYear().toString();
                const month = (log.jsDate.getMonth() + 1).toString();
                
                if (selectedYear !== 'all' && year !== selectedYear) return;
                if (selectedMonth !== 'all' && month !== selectedMonth) return;
                
                if (!userData[nameKey]) {
                    userData[nameKey] = { count: 0, totalDistance: 0 };
                }
                
                // [데이터 집계] 참여 횟수 및 거리 누적
                userData[nameKey].count += 1;
                userData[nameKey].totalDistance += log.distance; 
                
                totalDistSum += log.distance;
                totalCountSum += 1;
            });

            totalDistanceElement.innerText = totalDistSum.toFixed(2);
            totalCountElement.innerText = totalCountSum;

            // 정렬 로직 (거리순 또는 횟수순)
            currentSortedData = Object.entries(userData).sort((a, b) => {
                if (sortBy === 'distance') {
                    if (b[1].totalDistance !== a[1].totalDistance) return b[1].totalDistance - a[1].totalDistance;
                } else {
                    if (b[1].count !== a[1].count) return b[1].count - a[1].count;
                }
                return a[0].localeCompare(b[0]);
            });
            
            renderUsers(currentSortedData);
        }

        // 화면 렌더링
        function renderUsers(usersWithData) {
            userListElement.innerHTML = '';
            countElement.innerText = `총 ${usersWithData.length}명의 사용자 분석 완료`;

            if (usersWithData.length === 0) {
                userListElement.innerHTML = '<p class="text-slate-400 text-center py-10 font-medium italic">조건에 맞는 데이터가 없습니다.</p>';
                return;
            }

            usersWithData.forEach(([name, stats], i) => {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between p-4 bg-white rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition-all group";
                li.innerHTML = `
                    <div class="flex items-center">
                        <span class="text-xs font-black text-slate-300 w-6 mr-1 text-center">${i + 1}</span>
                        <div class="w-10 h-10 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-emerald-600 font-bold mr-3 group-hover:bg-emerald-600 group-hover:text-white transition-colors">
                            ${name.charAt(0)}
                        </div>
                        <div class="flex flex-col">
                            <span class="text-slate-800 font-bold uppercase tracking-tight">${name}</span>
                            <button onclick="openRenameModal('${name}')" class="text-[10px] text-emerald-500 hover:text-emerald-700 flex items-center mt-1 font-bold">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 mr-0.5" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                                </svg>
                                이름 수정
                            </button>
                        </div>
                    </div>
                    <div class="flex flex-col items-end space-y-1.5">
                        <div class="flex items-center space-x-2">
                            <div class="flex flex-col items-end">
                                <span class="text-[10px] text-slate-400 uppercase font-black leading-none">Distance</span>
                                <span class="text-sm font-black text-slate-700">${stats.totalDistance.toFixed(2)}<span class="text-[10px] ml-0.5">km</span></span>
                            </div>
                            <div class="flex flex-col items-end border-l border-slate-100 pl-2">
                                <span class="text-[10px] text-slate-400 uppercase font-black leading-none">Count</span>
                                <span class="text-sm font-black text-emerald-600">${stats.count}<span class="text-[10px] ml-0.5">회</span></span>
                            </div>
                        </div>
                    </div>
                `;
                userListElement.appendChild(li);
            });
        }

        yearSelect.addEventListener('change', applyFilters);
        monthSelect.addEventListener('change', applyFilters);
        sortSelect.addEventListener('change', applyFilters);

        window.downloadCSV = () => {
            if (currentSortedData.length === 0) return;
            const selectedYear = yearSelect.value === 'all' ? '전체연도' : yearSelect.value + '년';
            const selectedMonth = monthSelect.value === 'all' ? '전체월' : monthSelect.value + '월';
            let csvContent = "\uFEFF";
            csvContent += "순위,이름,총 거리(km),참여 횟수\n";
            currentSortedData.forEach(([name, stats], index) => {
                csvContent += `${index + 1},${name},${stats.totalDistance.toFixed(2)},${stats.count}\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", `songmirun_ranking_${selectedYear}_${selectedMonth}.csv`);
            link.click();
        };

        initApp();
    </script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-10 font-sans text-slate-900">
    <div class="max-w-md mx-auto">
        <!-- Header -->
        <div class="bg-emerald-600 rounded-t-2xl p-6 shadow-lg text-white">
            <div class="flex justify-between items-center mb-5">
                <h1 class="text-xl font-black flex items-center tracking-tight uppercase">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                    </svg>
                    Songmirun Supabase
                </h1>
                <button onclick="downloadCSV()" class="bg-white/20 hover:bg-white/30 text-white text-[10px] font-black py-1.5 px-3 rounded-lg flex items-center transition-colors border border-white/20 uppercase tracking-wider">
                    CSV Down
                </button>
            </div>
            
            <!-- Overall Stats Summary -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="bg-white/10 rounded-xl p-3 border border-white/10">
                    <p class="text-[10px] font-black uppercase text-emerald-100 mb-1">Total Distance</p>
                    <div class="flex items-baseline">
                        <span id="total-stats-distance" class="text-2xl font-black">0.00</span>
                        <span class="text-[10px] ml-1 font-bold text-emerald-100 uppercase">km</span>
                    </div>
                </div>
                <div class="bg-white/10 rounded-xl p-3 border border-white/10">
                    <p class="text-[10px] font-black uppercase text-emerald-100 mb-1">Total Logs</p>
                    <div class="flex items-baseline">
                        <span id="total-stats-count" class="text-2xl font-black">0</span>
                        <span class="text-[10px] ml-1 font-bold text-emerald-100 uppercase">Entries</span>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="grid grid-cols-2 gap-2">
                <div class="flex flex-col">
                    <label class="text-[10px] font-black uppercase mb-1 text-emerald-100">Year / Month (run_date)</label>
                    <div class="flex space-x-1">
                        <select id="year-filter" class="flex-1 bg-emerald-700 border-none rounded-lg text-[12px] font-bold p-2 text-white outline-none">
                            <option value="all">전체</option>
                            <option value="2024">2024년</option>
                            <option value="2025">2025년</option>
                            <option value="2026">2026년</option>
                        </select>
                        <select id="month-filter" class="flex-1 bg-emerald-700 border-none rounded-lg text-[12px] font-bold p-2 text-white outline-none">
                            <option value="all">전체</option>
                            <option value="1">1월</option><option value="2">2월</option><option value="3">3월</option>
                            <option value="4">4월</option><option value="5">5월</option><option value="6">6월</option>
                            <option value="7">7월</option><option value="8">8월</option><option value="9">9월</option>
                            <option value="10">10월</option><option value="11">11월</option><option value="12">12월</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-black uppercase mb-1 text-emerald-100">Sort By</label>
                    <select id="sort-filter" class="bg-emerald-700 border-none rounded-lg text-[12px] font-bold p-2 text-white outline-none">
                        <option value="distance">총 거리 순</option>
                        <option value="count">참여 횟수 순</option>
                    </select>
                </div>
            </div>
        </div>
        
        <!-- List Content -->
        <div class="bg-white rounded-b-2xl shadow-xl p-5 min-h-[400px]">
            <p id="user-count" class="text-slate-400 text-[10px] font-black mb-4 uppercase tracking-widest border-b border-slate-50 pb-2">Initializing Statistics...</p>
            
            <div id="loading" class="text-center py-20">
                <div class="animate-spin inline-block w-8 h-8 border-[3px] border-emerald-600 border-t-transparent rounded-full mb-3"></div>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Syncing Data...</p>
            </div>

            <ul id="user-list" class="space-y-4"></ul>
        </div>
    </div>

    <!-- Rename Modal -->
    <div id="rename-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl w-full max-w-xs shadow-2xl overflow-hidden">
            <div class="p-6">
                <h3 class="text-lg font-black text-slate-800 mb-1">이름 변경</h3>
                <p class="text-xs text-slate-400 mb-4 font-bold leading-relaxed">기록의 사용자 이름을 수정합니다.</p>
                <input type="text" id="new-name-input" 
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 font-bold text-slate-800"
                       placeholder="새 이름 입력">
            </div>
            <div class="flex border-t border-slate-100">
                <button onclick="closeRenameModal()" class="flex-1 px-4 py-4 text-xs font-black text-slate-400 hover:bg-slate-50 border-r border-slate-100 uppercase tracking-widest">
                    취소
                </button>
                <button onclick="confirmRename()" class="flex-1 px-4 py-4 text-xs font-black text-emerald-600 hover:bg-emerald-50 uppercase tracking-widest">
                    변경
                </button>
            </div>
        </div>
    </div>
</body>
</html>
