        const Icon = ({ name, size = 20, className = "" }) => <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;

        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        function App() {
            const [view, setView] = useState('user');
            const [user, setUser] = useState(null);
            const [currentSelections, setCurrentSelections] = useState({});
            const [votes, setVotes] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const result = await auth.signInAnonymously();
                        setUser(result.user);
                    } catch (error) { console.error("인증 에러:", error); }
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const votesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('votes');
                const unsubscribe = votesRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setVotes(data);
                    setLoading(false);
                }, (error) => console.error("데이터 읽기 에러:", error));
                return () => unsubscribe();
            }, [user]);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, loading]);

            const randomizedGroupedMenus = useMemo(() => {
                const groups = {};
                INITIAL_MENU_DATA.forEach(item => {
                    if (!groups[item.date]) groups[item.date] = [];
                    groups[item.date].push(item);
                });
                
                const result = {};
                Object.keys(groups).forEach(date => {
                    result[date] = shuffleArray(groups[date]);
                });
                return result;
            }, []);

            const handleRankSelection = (date, menuId, rank) => {
                setCurrentSelections(prev => {
                    const dateSelections = { ...(prev[date] || {}) };
                    Object.keys(dateSelections).forEach(r => {
                        if (dateSelections[r] === menuId) delete dateSelections[r];
                    });
                    dateSelections[rank] = menuId;
                    return { ...prev, [date]: dateSelections };
                });
            };

            const submitAllVotes = async () => {
                if (!user) return;
                const dates = Object.keys(randomizedGroupedMenus);
                const incomplete = dates.find(d => {
                    const sel = currentSelections[d];
                    return !sel || !sel[1] || !sel[2] || !sel[3];
                });
                
                if (incomplete) {
                    alert(`${incomplete} 날짜의 모든 순위를 선택해주세요.`);
                    return;
                }

                try {
                    const votesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('votes');
                    const batch = db.batch();
                    dates.forEach(date => {
                        const newDocRef = votesRef.doc();
                        batch.set(newDocRef, {
                            date,
                            ranks: currentSelections[date],
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            uid: user.uid
                        });
                    });
                    await batch.commit();
                    alert("투표가 성공적으로 저장되었습니다!");
                    setCurrentSelections({});
                    setView('admin');
                } catch (e) {
                    alert("저장에 실패했습니다. 다시 시도해주세요.");
                }
            };

            const resetData = async () => {
                if (!confirm("모든 투표 데이터를 초기화하시겠습니까?")) return;
                try {
                    const votesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('votes');
                    const snapshot = await votesRef.get();
                    const batch = db.batch();
                    snapshot.docs.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    alert("데이터가 초기화되었습니다.");
                } catch (e) { alert("초기화 실패"); }
            };

            const stats = useMemo(() => {
                const result = { overall: { 'A식당': 0, 'B식당': 0, 'C식당': 0 }, byDate: {} };
                votes.forEach(vote => {
                    if (!result.byDate[vote.date]) result.byDate[vote.date] = { 'A식당': 0, 'B식당': 0, 'C식당': 0 };
                    [1, 2, 3].forEach(rank => {
                        const menuId = vote.ranks[rank];
                        const menu = INITIAL_MENU_DATA.find(m => m.id === menuId);
                        if (menu) {
                            const score = 4 - parseInt(rank);
                            result.overall[menu.restaurant] += score;
                            result.byDate[vote.date][menu.restaurant] += score;
                        }
                    });
                });
                return result;
            }, [votes]);

            const chartData = Object.entries(stats.overall).map(([name, value]) => ({ name, value }));

                        </div>

                                    <p className="text-slate-500 text-sm">메뉴 순서는 랜덤으로 섞여 보여집니다.</p>
                                </header>

                                        <section key={date} className="space-y-4">
                                            <div className="flex items-center gap-2 text-xl font-bold text-slate-800">
                                                <span className="w-1.5 h-6 bg-blue-600 rounded-full"></span>
                                                {date}
                                            </div>

                                                        <div 
                                                            className="h-44 bg-slate-100 relative group cursor-pointer overflow-hidden"
                                                            onClick={() => window.open(item.imageUrl, '_blank')}
                                                        >
                                                            <img src={item.imageUrl} className="w-full h-full object-cover transition-transform group-hover:scale-105"  />
                                                            <div className="absolute inset-0 bg-black/5 group-hover:bg-black/20 transition-all flex items-center justify-center">
                                                                <Icon name="maximize-2" className="text-white opacity-0 group-hover:opacity-100 drop-shadow-lg" size={24} />
                                                            </div>
                                                            <div className="absolute top-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-bold text-blue-700 shadow-sm">Menu</div>
                                                        </div>
                                                        <div className="p-5 flex-1 flex flex-col justify-between">
                                                            <p className="text-sm leading-relaxed text-slate-700 line-clamp-4 mb-6">{item.menu}</p>
                                                            <div className="flex gap-2">
                                                                {[1, 2, 3].map(rank => (
                                                                    <button
                                                                        key={rank}
                                                                        onClick={() => handleRankSelection(date, item.id, rank)}
                                                                        className={`flex-1 py-3 rounded-xl border-2 text-xs font-bold transition-all ${
                                                                            currentSelections[date]?.[rank] === item.id 
                                                                            ? 'bg-blue-600 border-blue-600 text-white shadow-lg' 
                                                                            : 'bg-slate-50 border-slate-100 text-slate-400'
                                                                        }`}
                                                                    >
                                                                        {rank}순위
                                                                    </button>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    ))}
                                </div>

                                <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-40 w-full max-w-xs px-4">
                                    <button onClick={submitAllVotes} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-2xl active:scale-95 transition-transform flex items-center justify-center gap-2">
                                        <Icon name="check-circle" size={20} /> 투표 완료하기
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-10 fade-in">
                                <section className="bg-white rounded-3xl border border-slate-200 p-6 sm:p-10 shadow-sm text-center">
                                    <h2 className="text-xl font-bold mb-8">종합 선호도 랭킹 (누적 점수)</h2>
                                    <div className="h-72 w-full">
                                        {chartData.length > 0 && ResponsiveContainer ? (
                                            <ResponsiveContainer>
                                                <BarChart data={chartData}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="name" axisLine={false} tickLine={false} />
                                                    <YAxis hide />
                                                    <Tooltip cursor={{fill: 'transparent'}} contentStyle={{borderRadius:'12px', border:'none'}} />
                                                    <Bar dataKey="value" radius={[8, 8, 0, 0]} barSize={60}>
                                                        {chartData.map((e, i) => <Cell key={i} fill={['#3b82f6', '#10b981', '#f59e0b'][i % 3]} />)}
                                                    </Bar>
                                                </BarChart>
                                            </ResponsiveContainer>
                                        ) : (
                                            <div className="h-full flex items-center justify-center text-slate-400">데이터가 없습니다.</div>
                                        )}
                                    </div>
                                </section>

                                <section className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm">
                                            <thead>
                                                <tr className="bg-slate-50 text-slate-400 border-b">
                                                    <th className="p-4 pl-6">날짜</th>
                                                    <th className="p-4 text-center">A식당</th>
                                                    <th className="p-4 text-center">B식당</th>
                                                    <th className="p-4 text-center">C식당</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {Object.entries(stats.byDate).sort().map(([date, val]) => (
                                                    <tr key={date}>
                                                        <td className="p-4 pl-6 font-bold">{date}</td>
                                                        <td className="p-4 text-center text-blue-600 font-semibold">{val['A식당']}</td>
                                                        <td className="p-4 text-center text-emerald-600 font-semibold">{val['B식당']}</td>
                                                        <td className="p-4 text-center text-amber-600 font-semibold">{val['C식당']}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>

                                <div className="pt-10 flex flex-col items-center">
                                    <button onClick={resetData} className="px-6 py-2 rounded-lg bg-red-50 text-red-500 text-xs font-bold">
                                        관리자: 모든 데이터 초기화
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
