        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        function App() {
            const [view, setView] = useState('user');
            const [user, setUser] = useState(null);
            const [currentSelections, setCurrentSelections] = useState({});
            const [votes, setVotes] = useState([]);
            const [loading, setLoading] = useState(true);
            const [showDeleteModal, setShowDeleteModal] = useState(false);
            const [isDeleting, setIsDeleting] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
const [unlockCode, setUnlockCode] = useState('');


            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const res = await auth.signInAnonymously();
                        setUser(res.user);
                    } catch (e) { console.error(e); }
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const votesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('votes');
                const unsubscribe = votesRef.onSnapshot(snap => {
                    setVotes(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    setLoading(false);
                }, e => { console.error(e); setLoading(false); });
                return () => unsubscribe();
            }, [user]);

            const randomizedGroupedMenus = useMemo(() => {
                const groups = {};
                INITIAL_MENU_DATA.forEach(item => {
                    if (!groups[item.date]) groups[item.date] = [];
                    groups[item.date].push(item);
                });
                const result = {};
                Object.keys(groups).forEach(date => {
                    result[date] = shuffleArray(groups[date]);
                });
                return result;
            }, [view === 'user']);

            const handleRankSelection = useCallback((date, menuId, rank) => {
                const dayMenus = randomizedGroupedMenus[date];
                const allMenuIds = dayMenus.map(m => m.id);

                setCurrentSelections(prev => {
                    const nextDateSelections = { ...(prev[date] || {}) };
                    
                    Object.keys(nextDateSelections).forEach(r => {
                        if (nextDateSelections[r] === menuId) delete nextDateSelections[r];
                    });

                    nextDateSelections[rank] = menuId;

                    const selectedRanks = Object.keys(nextDateSelections).map(Number);
                    const selectedMenuIds = Object.values(nextDateSelections);

                    if (selectedMenuIds.length === 2) {
                        const remainingRank = [1, 2, 3].find(r => !selectedRanks.includes(r));
                        const remainingMenuId = allMenuIds.find(id => !selectedMenuIds.includes(id));
                        if (remainingRank && remainingMenuId) {
                            nextDateSelections[remainingRank] = remainingMenuId;
                        }
                    }

                    return { ...prev, [date]: nextDateSelections };
                });
            }, [randomizedGroupedMenus]);

            const fillRandomly = () => {
                const nextSelections = { ...currentSelections };
                Object.entries(randomizedGroupedMenus).forEach(([date, menus]) => {
                    // Only fill if not already completely filled for this date
                    if (!nextSelections[date] || Object.keys(nextSelections[date]).length < 3) {
                        const menuIds = shuffleArray(menus.map(m => m.id));
                        nextSelections[date] = {
                            1: menuIds[0],
                            2: menuIds[1],
                            3: menuIds[2]
                        };
                    }
                });
                setCurrentSelections(nextSelections);
            };

            const deleteAllVotes = async () => {
                if (isDeleting) return;
                setIsDeleting(true);
                try {
                    const votesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('votes');
                    const snapshot = await votesRef.get();
                    
                    const chunks = [];
                    let currentChunk = [];
                    snapshot.docs.forEach((doc, index) => {
                        currentChunk.push(doc.ref);
                        if (currentChunk.length === 500 || index === snapshot.docs.length - 1) {
                            chunks.push(currentChunk);
                            currentChunk = [];
                        }
                    });

                    for (const chunk of chunks) {
                        const batch = db.batch();
                        chunk.forEach(ref => batch.delete(ref));
                        await batch.commit();
                    }

                    setShowDeleteModal(false);
                    alert("모든 데이터가 성공적으로 삭제되었습니다.");
                } catch (e) {
                    console.error(e);
                    alert("데이터 삭제 중 오류가 발생했습니다.");
                } finally {
                    setIsDeleting(false);
                }
            };

            const submitAllVotes = async () => {
                if (!user || isSubmitting) return;
                const dates = Object.keys(randomizedGroupedMenus);
                const incomplete = dates.find(d => {
                    const sel = currentSelections[d];
                    return !sel || !sel[1] || !sel[2] || !sel[3];
                });
                if (incomplete) {
                    alert(`${incomplete} 날짜의 모든 순위를 선택해주세요.`);
                    return;
                }
                setIsSubmitting(true);
                try {
                    const votesRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('votes');
                    const batch = db.batch();
                    dates.forEach(date => {
                        batch.set(votesRef.doc(), {
                            date,
                            ranks: currentSelections[date],
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            uid: user.uid
                        });
                    });
                    await batch.commit();
                    alert("투표가 완료되었습니다!");
                    setCurrentSelections({});
                    setView('admin');
                } catch (e) {
                    alert("투표 저장에 실패했습니다.");
                } finally { setIsSubmitting(false); }
            };

            const stats = useMemo(() => {
                const result = { overall: { 'A식당': 0, 'B식당': 0, 'C식당': 0 }, byDate: {} };
                votes.forEach(vote => {
                    if (!result.byDate[vote.date]) result.byDate[vote.date] = { 'A식당': 0, 'B식당': 0, 'C식당': 0 };
                    if (vote.ranks) {
                        [1, 2, 3].forEach(rank => {
                            const menuId = vote.ranks[rank];
                            const menu = INITIAL_MENU_DATA.find(m => m.id === menuId);
                            if (menu) {
                                const score = 4 - parseInt(rank);
                                result.overall[menu.restaurant] += score;
                                result.byDate[vote.date][menu.restaurant] += score;
                            }
                        });
                    }
                });
                return result;
            }, [votes]);

            const chartData = useMemo(() => Object.entries(stats.overall).map(([name, value]) => ({ name, value })), [stats.overall]);

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-white"><div className="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div></div>;

            return (
                <div className="min-h-screen bg-[#f8fafc] flex flex-col">
                    <nav className="bg-white/90 backdrop-blur-md border-b sticky top-0 z-50 px-6 h-16 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-2 font-black text-xl text-blue-600 tracking-tight">
                            <Icons.Utensils />
                            <span>LUNCH RANK</span>
                        </div>
                        <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                            <button onClick={() => setView('user')} className={`px-5 py-2 rounded-xl text-sm font-bold transition-all ${view === 'user' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>투표하기</button>
                            <button onClick={() => setView('admin')} className={`px-5 py-2 rounded-xl text-sm font-bold transition-all ${view === 'admin' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500'}`}>결과보기</button>
                        </div>
                    </nav>

                    <main className="flex-1 max-w-6xl mx-auto w-full p-5 sm:p-10">
                        {view === 'user' ? (
                            <div className="space-y-16 fade-in pb-48">
                                <header className="text-center space-y-3">
                                    <h1 className="text-4xl font-black text-slate-900 leading-tight">선호하는 순서대로<br/>메뉴를 골라주세요</h1>
                                    <p className="text-slate-500 text-lg font-medium">두 곳을 고르면 마지막 하나는 자동으로 결정됩니다.</p>
                                </header>

                                {Object.entries(randomizedGroupedMenus).sort().map(([date, menus]) => (
                                    <section key={date} className="space-y-6">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <div className="bg-blue-600 text-white w-2 h-6 rounded-full"></div>
                                                <h2 className="text-2xl font-black text-slate-800 tracking-tight">{date}</h2>
                                            </div>
                                            {currentSelections[date] && Object.keys(currentSelections[date]).length === 3 && (
                                                <span className="flex items-center gap-1.5 text-blue-600 text-sm font-black bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100">
                                                    <Icons.Check /> 완료
                                                </span>
                                            )}
                                        </div>
                                        <div className="mobile-scroll-container">
                                            {menus.map(item => (
                                                <div key={item.id} className="menu-card bg-white rounded-[32px] border border-slate-200 shadow-sm overflow-hidden flex flex-col group relative transition-all hover:shadow-xl hover:border-blue-100">
                                                    <div className="relative h-72 bg-slate-100 overflow-hidden">
                                                        <img src={item.imageUrl} className="w-full h-full object-cover transition-transform group-hover:scale-105 duration-1000" />
                                                        
                                                        <button 
                                                            onClick={(e) => { e.stopPropagation(); window.open(item.imageUrl, '_blank'); }}
                                                            className="absolute top-5 right-5 z-20 p-2.5 bg-white/95 backdrop-blur rounded-2xl shadow-lg text-slate-700 hover:bg-white transition-all active:scale-90"
                                                        >
                                                            <Icons.ExternalLink />
                                                        </button>

                                                        <div className="absolute inset-x-0 bottom-0 p-5 rank-overlay flex flex-col justify-end space-y-4">
                                                            <div className="flex gap-2">
                                                                {[1, 2, 3].map(rank => {
                                                                    const isSelected = currentSelections[date]?.[rank] === item.id;
                                                                    return (
                                                                        <button
                                                                            key={rank}
                                                                            onClick={() => handleRankSelection(date, item.id, rank)}
                                                                            className={`flex-1 flex items-center justify-center gap-2 py-3.5 rounded-2xl text-[13px] font-black transition-all border-2 ${
                                                                                isSelected 
                                                                                ? 'bg-blue-600 border-blue-600 text-white shadow-[0_8px_20px_-5px_rgba(37,99,235,0.6)] scale-105 z-10' 
                                                                                : 'bg-white/10 backdrop-blur-xl border-white/20 text-white hover:bg-white/20'
                                                                            }`}
                                                                        >
                                                                            {isSelected && <Icons.Check />}
                                                                            {rank}위
                                                                        </button>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>

                                                        <div className="absolute top-5 left-5 bg-white text-slate-900 px-4 py-2 rounded-2xl text-[12px] font-black shadow-lg border border-slate-100">
                                                            menu
                                                        </div>
                                                    </div>

                                                    <div className="p-7 flex-1">
                                                        <p className="text-sm font-semibold leading-relaxed text-slate-500 line-clamp-4 italic">
                                                            "{item.menu}"
                                                        </p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                ))}

                                <div className="fixed bottom-0 left-0 right-0 p-6 glass-panel border-t border-slate-200 flex flex-col items-center gap-3 shadow-[0_-10px_40px_rgba(0,0,0,0.05)]">
                                    <div className="flex w-full max-w-lg gap-3">
                                        <button 
                                            onClick={submitAllVotes} 
                                            disabled={isSubmitting}
                                            className={`flex-[2] bg-blue-600 text-white py-4.5 rounded-3xl font-black shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3 py-4 ${isSubmitting ? 'opacity-70' : 'hover:bg-blue-700'}`}
                                        >
                                            {isSubmitting ? "전송 중..." : "투표 결과 전송하기"}
                                        </button>

                                        <button 
                                            onClick={fillRandomly}
                                            className="flex-1 bg-white border-2 border-slate-200 text-slate-700 py-4.5 rounded-3xl font-black transition-all hover:bg-slate-50 active:scale-95 flex items-center justify-center gap-2 py-4"
                                        >
                                            <Icons.Zap /> 순위초기화
                                        </button>

                                    </div>
                                    <p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest">2026 학/운/위</p>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8 fade-in pb-32">
                                <section className="bg-white rounded-[40px] border border-slate-200 p-8 sm:p-12 shadow-sm">
                                    <div className="flex flex-col items-center gap-2 mb-12">
                                        <h2 className="text-2xl font-black text-slate-900 tracking-tight">선호도 종합 차트</h2>
                                        <p className="text-slate-500 font-medium">실시간으로 집계된 누적 선호도 지수입니다.</p>
                                    </div>
                                    <div className="h-80 w-full">
                                        {chartData.some(d => d.value > 0) ? (
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={chartData} margin={{top: 10, right: 30, left: 0, bottom: 0}}>
                                                    <CartesianGrid strokeDasharray="6 6" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize:15, fontWeight:800, fill: '#64748b'}} />
                                                    <YAxis hide />
                                                    <Tooltip 
                                                        cursor={{fill: '#f8fafc'}} 
                                                        contentStyle={{borderRadius:'24px', border:'none', boxShadow:'0 25px 50px -12px rgba(0,0,0,0.15)', padding: '16px'}} 
                                                    />
                                                    <Bar dataKey="value" radius={[16, 16, 0, 0]} barSize={70}>
                                                        {chartData.map((e, i) => (
                                                            <Cell key={`cell-${i}`} fill={['#3b82f6', '#10b981', '#f59e0b'][i % 3]} />
                                                        ))}
                                                    </Bar>
                                                </BarChart>
                                            </ResponsiveContainer>
                                        ) : (
                                            <div className="h-full flex flex-col items-center justify-center text-slate-300 italic">아직 투표 데이터가 없습니다.</div>
                                        )}
                                    </div>
                                </section>

                                <div className="grid grid-cols-1 gap-8">
                                    <section className="bg-white rounded-[40px] border border-slate-200 shadow-sm overflow-hidden">
                                        <div className="p-8 border-b border-slate-100 flex items-center justify-between">
                                            <h3 className="text-xl font-black text-slate-900">상세 집계표</h3>
                                            <div className="flex gap-4 text-xs font-black">
                                                <span className="flex items-center gap-1.5 text-blue-600"><div className="w-2 h-2 rounded-full bg-blue-600"></div> A식당</span>
                                                <span className="flex items-center gap-1.5 text-emerald-600"><div className="w-2 h-2 rounded-full bg-emerald-600"></div> B식당</span>
                                                <span className="flex items-center gap-1.5 text-amber-600"><div className="w-2 h-2 rounded-full bg-amber-600"></div> C식당</span>
                                            </div>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left text-sm min-w-[500px]">
                                                <thead className="bg-slate-50/50 text-slate-400">
                                                    <tr>
                                                        <th className="p-6 pl-10 font-bold uppercase tracking-wider">투표일자</th>
                                                        <th className="p-6 text-center font-bold">A 지수</th>
                                                        <th className="p-6 text-center font-bold">B 지수</th>
                                                        <th className="p-6 text-center font-bold">C 지수</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {Object.entries(stats.byDate).sort().map(([date, val]) => (
                                                        <tr key={date} className="hover:bg-slate-50/80 transition-colors">
                                                            <td className="p-6 pl-10 font-black text-slate-700">{date}</td>
                                                            <td className="p-6 text-center text-blue-600 font-bold bg-blue-50/30">{val['A식당']}</td>
                                                            <td className="p-6 text-center text-emerald-600 font-bold bg-emerald-50/30">{val['B식당']}</td>
                                                            <td className="p-6 text-center text-amber-600 font-bold bg-amber-50/30">{val['C식당']}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </section>
                                    
<div className="flex flex-col items-center justify-center pt-8 space-y-3">
    
    <div className="flex items-center gap-2 p-2 bg-slate-50 rounded-[28px] border border-slate-100 shadow-inner">
        <input 
            type="password"
            value={unlockCode}
            onChange={(e) => setUnlockCode(e.target.value)}
            placeholder="초기화"
            className="bg-transparent pl-4 pr-2 py-2 w-24 text-sm font-bold focus:outline-none text-slate-600"
        />
        
        <button 
            disabled={unlockCode !== '444'}
            onClick={() => {
                setShowDeleteModal(true);
                setUnlockCode(''); // 모달 띄운 후 입력값 초기화
            }}
            className={`
                flex items-center gap-2 px-6 py-3 rounded-[22px] font-black text-sm transition-all
                ${unlockCode === '444' 
                    ? 'bg-red-500 text-white shadow-lg shadow-red-200 hover:bg-red-600 active:scale-95' 
                    : 'bg-slate-200 text-slate-400 cursor-not-allowed opacity-60'}
            `}
        >
            <Icons.Trash2 size={18} />
            데이터 초기화
        </button>
    </div>
    
    {/* 안내 문구 (선택 사항) */}
    {unlockCode.length > 0 && unlockCode !== '444' && (
        <p className="text-[11px] text-red-400 font-bold animate-pulse">암호가 일치하지 않습니다</p>
    )}
</div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Delete Confirmation Modal */}
                    {showDeleteModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 fade-in">
                            <div className="absolute inset-0 modal-overlay" onClick={() => !isDeleting && setShowDeleteModal(false)}></div>
                            <div className="relative bg-white rounded-[40px] shadow-2xl w-full max-w-md p-10 text-center space-y-8">
                                <div className="flex justify-center">
                                    <div className="w-20 h-20 bg-red-50 rounded-full flex items-center justify-center">
                                        <Icons.AlertCircle />
                                    </div>
                                </div>
                                <div className="space-y-3">
                                    <h3 className="text-2xl font-black text-slate-900">데이터를 삭제할까요?</h3>
                                    <p className="text-slate-500 font-medium leading-relaxed">
                                        현재까지 집계된 모든 투표 결과가 영구적으로 삭제됩니다. 이 작업은 되돌릴 수 없습니다.
                                    </p>
                                </div>
                                <div className="flex flex-col gap-3">
                                    <button 
                                        disabled={isDeleting}
                                        onClick={deleteAllVotes}
                                        className={`w-full py-4.5 bg-red-500 text-white rounded-3xl font-black shadow-lg shadow-red-200 transition-all active:scale-95 py-4 ${isDeleting ? 'opacity-50' : 'hover:bg-red-600'}`}
                                    >
                                        {isDeleting ? "삭제 처리 중..." : "네, 모두 삭제합니다"}
                                    </button>
                                    <button 
                                        disabled={isDeleting}
                                        onClick={() => setShowDeleteModal(false)}
                                        className="w-full py-4.5 bg-slate-100 text-slate-600 rounded-3xl font-black transition-all hover:bg-slate-200 active:scale-95 py-4"
                                    >
                                        취소
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
