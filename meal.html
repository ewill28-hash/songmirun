  { id: '15', date: '2026-03-10', restaurant: 'B식당', menu: '채식의 날 - 발아흑미밥, 들깨수제비 , 도토리묵무침 , 오징어김치전(완제) , 겉절이 , 요거톡 ', imageUrl: 'https://ihs.icehs.kr/upload/foodlist/ihs_h/1773110500067.jpg' },
  { id: '16', date: '2026-03-11', restaurant: 'B식당', menu: '채식의 날 - 검은깨밥 , 국물떡볶이 , 김말이 , 통새우만두, 반달단무지, 야채주스', imageUrl: 'https://ihs.icehs.kr/upload/foodlist/ihs_h/1773208065840.jpg' },
  { id: '17', date: '2026-03-12', restaurant: 'B식당', menu: '오색쌀밥, 햄모듬찌개(라면), 브로콜리된장마요무침 , 연어데리야끼구이 , 궁채장아찌, 워터젤리(복숭아) ', imageUrl: 'https://ihs.icehs.kr/upload/foodlist/ihs_h/1773294559368.jpg' },
  { id: '18', date: '2026-03-13', restaurant: 'B식당', menu: '현미차조밥, 해물두부찌개, 명란계란찜 , 어묵잡채 , 총각김치 , 아이스크림 ', imageUrl: 'https://ihs.icehs.kr/upload/foodlist/ihs_h/1773375557872.jpg' },

  // C식당
  { id: '19', date: '2026-03-03', restaurant: 'C식당', menu: '흑미밥, 소고기미역국, 치즈닭볶음, 한식잡채, 도라지오이무침, 배추김치, 딸기', imageUrl: 'https://ongnyeon-gh.icehs.kr/upload/foodlist/okryun_h/1772507012819.jpg' },
  { id: '20', date: '2026-03-04', restaurant: 'C식당', menu: '카레라이스, 얼큰콩나물국, 등심돈까스*소스, 치커리사과무침, 배추김치, 구슬아이스크림', imageUrl: 'https://ongnyeon-gh.icehs.kr/upload/foodlist/okryun_h/1772594455633.jpg' },
  { id: '21', date: '2026-03-05', restaurant: 'C식당', menu: '기장밥, 부대찌개, 돼지고기장조림, 꽃맛살어묵볶음, 시금치나물, 깍두기, 천혜향', imageUrl: 'https://ongnyeon-gh.icehs.kr/upload/foodlist/okryun_h/1772684670982.jpg' },
  { id: '22', date: '2026-03-06', restaurant: 'C식당', menu: '참치야채비빔밥, 고추장/김가루, 달걀호박국, 허니버터회오리감자, 배추김치, 꿀자몽블랙티', imageUrl: 'https://ongnyeon-gh.icehs.kr/upload/foodlist/okryun_h/1772766994109.jpg' },
  { id: '23', date: '2026-03-09', restaurant: 'C식당', menu: '흑미밥, 돈육김치찌개, 훈제오리햄볶음, 마파두부, 김자반볶음, 배추김치, 마카롱', imageUrl: 'https://ongnyeon-gh.icehs.kr/upload/foodlist/okryun_h/1773025960038.jpg' },
  { id: '24', date: '2026-03-10', restaurant: 'C식당', menu: '차조밥, 설렁탕*소면, 비비고떡갈비, 단호박고구마맛탕, 골뱅이채소무침, 깍두기, 초코라떼', imageUrl: 'https://ongnyeon-gh.icehs.kr/upload/foodlist/okryun_h/1773110758628.jpg' },
  { id: '25', date: '2026-03-11', restaurant: 'C식당', menu: '베이컨계란볶음밥, 팽이버섯장국, 오븐에구운탕수육, 마라떡볶이, 배추김치, 샤인머스캣', imageUrl: 'https://ongnyeon-gh.icehs.kr/upload/foodlist/okryun_h/1773192963845.jpg' },
  { id: '26', date: '2026-03-12', restaurant: 'C식당', menu: '기장밥, 뼈없는감자탕, 불닭마요치킨, 달걀찜, 흑임자브로콜리무침, 배추김치, 사르르딸기콘', imageUrl: 'https://ongnyeon-gh.icehs.kr/upload/foodlist/okryun_h/1773279280156.jpg' },
  { id: '27', date: '2026-03-13', restaurant: 'C식당', menu: '백미밥, 순두부맑은국, 소고기버섯볶음, 물만두땅콩강정, 검은깨올밤묵무침, 배추겉절이, 오렌지', imageUrl: 'https://ongnyeon-gh.icehs.kr/upload/foodlist/okryun_h/1773366403875.jpg' }
];

        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={`inline-block ${className}`}></i>;
        };

        function App() {
            const [view, setView] = useState('user');
            const [currentSelections, setCurrentSelections] = useState({});
            const [votes, setVotes] = useState([]);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view]);

            const groupedMenus = useMemo(() => {
                const groups = {};
                INITIAL_MENU_DATA.forEach(item => {
                    if (!groups[item.date]) groups[item.date] = [];
                    groups[item.date].push(item);
                });
                return groups;
            }, []);

            const handleRankSelection = (date, menuId, rank) => {
                setCurrentSelections(prev => {
                    const dateSelections = { ...(prev[date] || {}) };
                    Object.keys(dateSelections).forEach(r => {
                        if (dateSelections[r] === menuId) delete dateSelections[r];
                    });
                    dateSelections[rank] = menuId;
                    return { ...prev, [date]: dateSelections };
                });
            };

            const submitAllVotes = () => {
                const dates = Object.keys(groupedMenus);
                const incomplete = dates.find(d => {
                    const sel = currentSelections[d];
                    return !sel || !sel[1] || !sel[2] || !sel[3];
                });
                
                if (incomplete) {
                    alert(`${incomplete} 날짜의 1, 2, 3순위를 모두 선택해주세요.`);
                    return;
                }

                const newVotes = dates.map(date => ({
                    id: Math.random().toString(36).substr(2, 9),
                    date: date,
                    ranks: currentSelections[date],
                    timestamp: new Date().toISOString()
                }));

                setVotes(prev => [...prev, ...newVotes]);
                alert("선호도 조사가 성공적으로 제출되었습니다!");
                setCurrentSelections({});
                setView('admin');
            };

            const stats = useMemo(() => {
                const result = { overall: { 'A식당': 0, 'B식당': 0, 'C식당': 0 }, byDate: {} };
                votes.forEach(vote => {
                    if (!result.byDate[vote.date]) result.byDate[vote.date] = { 'A식당': 0, 'B식당': 0, 'C식당': 0 };
                    [1, 2, 3].forEach(rank => {
                        const menuId = vote.ranks[rank];
                        const menu = INITIAL_MENU_DATA.find(m => m.id === menuId);
                        if (menu) {
                            const score = 4 - rank; // 1순위: 3점, 2순위: 2점, 3순위: 1점
                            result.overall[menu.restaurant] += score;
                            result.byDate[vote.date][menu.restaurant] += score;
                        }
                    });
                });
                return result;
            }, [votes]);

            const chartData = Object.entries(stats.overall).map(([name, value]) => ({ name, value }));

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col">
                    <nav className="bg-white border-b sticky top-0 z-50 shadow-sm px-4 h-16 flex items-center justify-between">
                        <div className="flex items-center gap-2 font-bold text-xl text-blue-700">
                            <Icon name="utensils" size={24} />
                            <span className="hidden sm:inline">식단 선호도 조사</span>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl">
                            <button 
                                onClick={() => setView('user')} 
                                className={`flex items-center gap-1.5 px-5 py-2 rounded-lg text-sm font-semibold transition-all ${view === 'user' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                <Icon name="list-checks" size={16} /> 투표하기
                            </button>
                            <button 
                                onClick={() => setView('admin')} 
                                className={`flex items-center gap-1.5 px-5 py-2 rounded-lg text-sm font-semibold transition-all ${view === 'admin' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                            >
                                <Icon name="bar-chart-3" size={16} /> 통계보기
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 max-w-6xl mx-auto w-full p-4 sm:p-6 lg:p-8">
                        {view === 'user' ? (
                            <div className="space-y-12 animate-in fade-in duration-500">
                                <header className="text-center space-y-3">
                                    <h1 className="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">오늘의 메뉴 선호도</h1>
                                    <p className="text-lg text-slate-500 max-w-2xl mx-auto">각 날짜별로 가장 기대되는 식당 메뉴의 순위를 정해주세요!</p>
                                </header>

                                <div className="space-y-16">
                                    {Object.entries(groupedMenus).sort().map(([date, menus]) => (
                                        <section key={date} className="space-y-6">
                                            <div className="flex items-center gap-3 text-2xl font-bold text-slate-800 border-l-4 border-blue-600 pl-4">
                                                <Icon name="calendar" className="text-blue-600" size={24} />
                                                {date}
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                {menus.map(item => (
                                                    <div key={item.id} className="bg-white rounded-3xl border border-slate-200 shadow-sm flex flex-col overflow-hidden hover:shadow-xl transition-all hover:-translate-y-1">
                                                        <div className="h-44 bg-slate-100 relative overflow-hidden group">
                                                            <img 
                                                                src={item.imageUrl} 
                                                                className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" 
                                                                alt="restaurant"
                                                            />
                                                            <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                                            <span className="absolute bottom-3 left-4 bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-bold shadow-lg">
                                                                "식당"
                                                            </span>
                                                            <button 
                                                                onClick={() => window.open(item.imageUrl, '_blank')}
                                                                className="absolute top-3 right-3 bg-white/20 backdrop-blur-md p-2 rounded-full text-white hover:bg-white/40 transition-colors"
                                                            >
                                                                <Icon name="maximize-2" size={18} />
                                                            </button>
                                                        </div>
                                                        <div className="p-5 flex-1 flex flex-col justify-between space-y-6">
                                                            <p className="text-[15px] leading-relaxed text-slate-700 min-h-[4.5rem]">
                                                                {item.menu}
                                                            </p>
                                                            <div className="grid grid-cols-3 gap-2 pt-4 border-t border-slate-100">
                                                                {[1, 2, 3].map(rank => (
                                                                    <button
                                                                        key={rank}
                                                                        onClick={() => handleRankSelection(date, item.id, rank)}
                                                                        className={`flex flex-col items-center py-2.5 rounded-xl border-2 transition-all ${
                                                                            currentSelections[date]?.[rank] === item.id 
                                                                            ? 'bg-blue-600 border-blue-600 text-white shadow-md ring-4 ring-blue-100' 
                                                                            : 'bg-slate-50 border-slate-100 text-slate-400 hover:border-blue-200 hover:text-blue-500'
                                                                        }`}
                                                                    >
                                                                        <span className="text-[10px] font-bold uppercase opacity-80">{rank}순위</span>
                                                                    </button>
                                                                ))}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    ))}
                                </div>

                                <div className="fixed bottom-8 left-0 right-0 z-40 px-4 pointer-events-none">
                                    <div className="max-w-xs mx-auto pointer-events-auto">
                                        <button 
                                            onClick={submitAllVotes} 
                                            className="w-full bg-blue-700 text-white py-4 px-6 rounded-2xl font-bold text-lg shadow-2xl hover:bg-blue-800 transition-all flex items-center justify-center gap-3 transform active:scale-95 ring-4 ring-white"
                                        >
                                            <Icon name="check-circle" size={24} /> 
                                            조사 완료 및 제출
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-in slide-in-from-bottom-4 duration-500">
                                <header className="text-center space-y-2 mb-10">
                                    <h1 className="text-3xl font-bold">실시간 선호도 통계</h1>
                                    <p className="text-slate-500">총 {votes.length / Object.keys(groupedMenus).length}명의 응답 데이터가 반영되었습니다.</p>
                                </header>

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <section className="lg:col-span-2 bg-white rounded-3xl border border-slate-200 p-8 shadow-sm">
                                        <h2 className="text-xl font-bold mb-8 flex items-center gap-2">
                                            <Icon name="trending-up" className="text-blue-600" />
                                            식당별 누적 선호 점수
                                        </h2>
                                        <div className="h-80 w-full">
                                            {window.Recharts ? (
                                                <ResponsiveContainer>
                                                    <BarChart data={chartData} margin={{ top: 20, right: 30, left: 0, bottom: 0 }}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 14, fontWeight: 600}} />
                                                        <YAxis axisLine={false} tickLine={false} hide />
                                                        <Tooltip 
                                                            cursor={{fill: '#f8fafc'}}
                                                            contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)' }}
                                                        />
                                                        <Bar dataKey="value" radius={[12, 12, 0, 0]} barSize={60}>
                                                            {chartData.map((e, i) => (
                                                                <Cell key={i} fill={['#3b82f6', '#10b981', '#f59e0b'][i % 3]} />
                                                            ))}
                                                        </Bar>
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            ) : (
                                                <div className="h-full flex items-center justify-center text-slate-400">그래프 로딩 중...</div>
                                            )}
                                        </div>
                                    </section>

                                    <div className="space-y-6">
                                        {chartData.sort((a, b) => b.value - a.value).map((item, idx) => (
                                            <div key={item.name} className="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm flex items-center justify-between">
                                                <div className="flex items-center gap-4">
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center font-bold text-white shadow-sm ${idx === 0 ? 'bg-amber-400' : 'bg-slate-200'}`}>
                                                        {idx + 1}
                                                    </div>
                                                    <div>
                                                        <div className="font-bold text-lg">{item.name}</div>
                                                        <div className="text-xs text-slate-400 uppercase tracking-wider">Restaurant</div>
                                                    </div>
                                                </div>
                                                <div className="text-2xl font-black text-blue-600">{item.value}<span className="text-sm font-medium ml-1">pts</span></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <section className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                                    <div className="px-8 py-6 border-b border-slate-100 flex justify-between items-center">
                                        <h2 className="text-xl font-bold">날짜별 상세 데이터</h2>
                                        <span className="text-xs font-semibold text-slate-400 px-3 py-1 bg-slate-50 rounded-full italic">점수 합산 방식: 1순위(3점), 2순위(2점), 3순위(1점)</span>
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-slate-500 text-xs font-bold uppercase tracking-widest">
                                                <tr>
                                                    <th className="px-8 py-5">날짜</th>
                                                    <th className="px-8 py-5">A식당</th>
                                                    <th className="px-8 py-5">B식당</th>
                                                    <th className="px-8 py-5">C식당</th>
                                                    <th className="px-8 py-5">Best Choice</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {Object.entries(stats.byDate).sort().map(([date, val]) => {
                                                    const maxVal = Math.max(...Object.values(val));
                                                    const winner = Object.keys(val).find(k => val[k] === maxVal && maxVal > 0);
                                                    return (
                                                        <tr key={date} className="hover:bg-slate-50/50 transition-colors">
                                                            <td className="px-8 py-5 font-bold text-slate-900">{date}</td>
                                                            <td className="px-8 py-5 text-slate-600">{val['A식당']}점</td>
                                                            <td className="px-8 py-5 text-slate-600">{val['B식당']}점</td>
                                                            <td className="px-8 py-5 text-slate-600">{val['C식당']}점</td>
                                                            <td className="px-8 py-5">
                                                                {winner ? (
                                                                    <span className="inline-flex items-center px-4 py-1 rounded-full text-xs font-black bg-blue-100 text-blue-700 ring-1 ring-blue-200 uppercase">
                                                                        {winner}
                                                                    </span>
                                                                ) : <span className="text-slate-300">-</span>}
                                                            </td>
                                                        </tr>
                                                    );
                                                })}
                                                {Object.keys(stats.byDate).length === 0 && (
                                                    <tr>
                                                        <td colSpan="5" className="px-8 py-16 text-center text-slate-400 font-medium">
                                                            아직 수집된 투표 데이터가 없습니다.
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    <footer className="bg-white border-t py-6 px-4">
                        <div className="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4 text-slate-400 text-xs font-medium">
                            <p>© 2026 학/운/위</p>

                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
