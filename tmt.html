<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tournament Master Cloud 🍊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        :root { --primary: #f97316; --bg-main: #fffaf5; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-main); color: #431407; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .bracket-connector { position: absolute; border-color: #fdba74; border-style: solid; pointer-events: none; z-index: 0; }
        .match-card { z-index: 10; transition: all 0.3s ease; }
        .winner-glow { box-shadow: 0 0 30px rgba(249, 115, 22, 0.3); border: 2px solid var(--primary) !important; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
        .round-header-sticky { position: sticky; top: 0; background: rgba(255, 250, 245, 0.9); z-index: 30; backdrop-filter: blur(12px); padding: 12px 0; }
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fed7aa; border-radius: 10px; }
        .no-export { data-html2canvas-ignore: true; }
        .capturing .match-card span { line-height: 1.6 !important; display: inline-block !important; vertical-align: middle; }
    </style>
</head>
<body class="custom-scroll select-none">

    <div id="app" class="min-h-screen flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-14 md:h-16 bg-white border-b border-orange-100 px-4 md:px-6 flex items-center justify-between sticky top-0 z-[60] shadow-sm no-export">
            <div class="flex items-center gap-2">
                <div class="bg-orange-500 p-1.5 rounded-lg shadow-lg shadow-orange-100">
                    <i data-lucide="cloud" class="text-white w-4 h-4"></i>
                </div>
                <h1 class="text-sm md:text-base font-black text-slate-800 uppercase tracking-tighter">
                    T-Master <span class="text-orange-500">Cloud</span> 🍊
                </h1>
            </div>
            <div id="header-actions" class="flex items-center gap-2">
                <div id="auth-status" class="hidden text-[10px] font-bold text-orange-400 bg-orange-50 px-2 py-1 rounded-full uppercase">Connecting...</div>
                <button id="admin-btn" class="p-2 text-slate-400 hover:text-orange-500 transition-colors">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <!-- Main View -->
        <main id="main-view" class="flex-1 overflow-auto custom-scroll relative bg-[#fffaf5]">
            <div id="loading-view" class="flex flex-col items-center justify-center h-full gap-4">
                <div class="w-10 h-10 border-4 border-orange-200 border-t-orange-500 rounded-full animate-spin"></div>
                <p id="loading-text" class="text-orange-500 font-bold text-sm">데이터를 불러오는 중...</p>
                <p id="loading-subtext" class="text-slate-400 text-xs">서버 연결을 확인하고 있습니다.</p>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="hidden fixed inset-0 z-[100] bg-orange-950/40 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white rounded-[2rem] w-full max-w-sm shadow-2xl overflow-hidden" id="modal-box">
            <div class="p-6">
                <h3 id="modal-title" class="text-lg font-bold text-slate-900 mb-2"></h3>
                <div id="modal-content" class="mb-4">
                    <p id="modal-desc" class="text-slate-500 text-sm leading-relaxed"></p>
                </div>
            </div>
            <div class="p-4 bg-orange-50 flex gap-2" id="modal-footer">
                <button id="modal-cancel" class="flex-1 py-3 text-slate-600 text-sm font-bold hover:bg-orange-100 rounded-xl">취소</button>
                <button id="modal-confirm" class="flex-1 py-3 bg-orange-500 text-white text-sm font-bold hover:bg-orange-600 rounded-xl">확인</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "", 
            authDomain: "tele-486906.firebaseapp.com",
            projectId: "tele-486906",
            storageBucket: "tele-486906.firebasestorage.app",
            messagingSenderId: "780009385301",
            appId: "1:780009385301:web:4163b27573a0b5e72e13dc"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'tournament-cloud-v1';

        let app, auth, db;
        let user = null;
        let isAdmin = false;
        let competitions = [];
        let activeComp = null;

        const getCompCollection = () => collection(db, 'artifacts', appId, 'public', 'data', 'competitions');
        const getCompDoc = (id) => doc(db, 'artifacts', appId, 'public', 'data', 'competitions', id);

        async function initApp() {
            try {
                // 1. Initialize Firebase
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                
                // 2. Set up Auth Listener BEFORE signing in
                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (user) {
                        const statusEl = document.getElementById('auth-status');
                        if (statusEl) {
                            statusEl.innerText = "Online 🟢";
                            statusEl.classList.remove('hidden');
                        }
                        subscribeToCompetitions();
                    }
                });

                // 3. Perform Sign-in
                await initAuth();
                
            } catch (e) {
                console.error("Initialization Error", e);
                const textEl = document.getElementById('loading-text');
                const subEl = document.getElementById('loading-subtext');
                if(textEl) textEl.innerText = "설정 오류 발생";
                if(subEl) subEl.innerText = "Firebase 설정 정보를 확인해주세요.";
            }
        }

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) { 
                console.error("Auth Error", e); 
                const textEl = document.getElementById('loading-text');
                if(textEl) textEl.innerText = "인증 오류 발생";
            }
        }

        function subscribeToCompetitions() {
            if (!user || !db) return;
            onSnapshot(getCompCollection(), (snapshot) => {
                competitions = snapshot.docs.map(d => {
                    const data = d.data();
                    if (data.rounds && typeof data.rounds === 'string') {
                        try { data.rounds = JSON.parse(data.rounds); } catch(e) { data.rounds = []; }
                    }
                    return { id: d.id, ...data };
                });
                activeComp = competitions.find(c => c.isActive) || null;
                render();
            }, (err) => {
                console.error("Firestore Listen Error", err);
                const textEl = document.getElementById('loading-text');
                const subEl = document.getElementById('loading-subtext');
                if(textEl) textEl.innerText = "데이터 연결 실패";
                if(subEl) subEl.innerText = "권한 설정(Rules)을 확인해주세요.";
            });
        }

        function render() {
            const main = document.getElementById('main-view');
            if (!main) return;
            
            if (isAdmin) renderAdminView(main);
            else if (!activeComp) renderEmptyView(main);
            else renderBracketView(main);
            
            if (window.lucide) lucide.createIcons();
        }

        function renderEmptyView(container) {
            container.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full p-10 text-center">
                    <div class="w-20 h-20 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center mb-6">
                        <i data-lucide="calendar-off" class="w-10 h-10"></i>
                    </div>
                    <h2 class="text-2xl font-black text-slate-800 mb-2">진행 중인 경기가 없습니다. 🍊</h2>
                    <p class="text-slate-400 text-sm">관리자가 경기를 활성화할 때까지 기다려주세요.</p>
                </div>
            `;
        }

        function renderAdminView(container) {
            container.innerHTML = `
                <div class="max-w-2xl mx-auto p-6">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-xl font-black">관리자 도구 🛠️</h2>
                        <button onclick="window.logoutAdmin()" class="text-xs font-bold text-slate-400 hover:text-red-500">로그아웃</button>
                    </div>
                    
                    <button onclick="window.createCompetition()" class="w-full py-4 mb-6 bg-orange-500 text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2">
                        <i data-lucide="plus" class="w-5 h-5"></i> 새 경기 생성하기
                    </button>

                    <div class="space-y-4">
                        ${competitions.map(c => `
                            <div class="bg-white p-5 rounded-2xl border border-orange-100 shadow-sm flex items-center justify-between">
                                <div class="flex-1 mr-4">
                                    <div class="flex items-center gap-2 mb-1">
                                        <h3 class="font-bold text-slate-800 truncate">${c.title}</h3>
                                        ${c.isActive ? '<span class="px-2 py-0.5 bg-green-100 text-green-600 text-[10px] font-bold rounded-full">활성</span>' : ''}
                                    </div>
                                    <p class="text-xs text-slate-400">${c.date || '날짜 미정'}</p>
                                </div>
                                <div class="flex items-center gap-1">
                                    <button onclick="window.editTitle('${c.id}')" class="p-2 text-slate-400 hover:text-orange-500"><i data-lucide="edit-3" class="w-4 h-4"></i></button>
                                    <button onclick="window.toggleActive('${c.id}')" class="p-2 ${c.isActive ? 'text-green-500' : 'text-slate-300'}"><i data-lucide="power" class="w-4 h-4"></i></button>
                                    <button onclick="window.editParticipants('${c.id}')" class="p-2 text-orange-500"><i data-lucide="users" class="w-4 h-4"></i></button>
                                    <button onclick="window.deleteComp('${c.id}')" class="p-2 text-red-300 hover:text-red-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderBracketView(container) {
            if (!activeComp || !activeComp.rounds || activeComp.rounds.length === 0) {
                container.innerHTML = `<div class="flex items-center justify-center h-full"><p class="text-orange-300 font-bold">대진표 대기 중...</p></div>`;
                return;
            }

            let roundsHtml = activeComp.rounds.map((round, rIdx) => {
                const label = rIdx === activeComp.rounds.length - 1 ? '🏆 결승' : (rIdx === activeComp.rounds.length - 2 ? '🔥 준결승' : `RD ${rIdx + 1}`);
                return `
                <div class="flex flex-col min-w-[180px] md:min-w-[240px]">
                    <div class="round-header-sticky mb-2 text-center">
                        <span class="inline-block px-4 py-1.5 bg-white border border-orange-200 shadow-sm text-orange-600 text-[10px] font-black uppercase rounded-full">${label}</span>
                    </div>
                    <div class="flex flex-col justify-around flex-1 gap-8 py-6">
                        ${round.map((match, mIdx) => renderMatchCard(match, rIdx, mIdx)).join('')}
                    </div>
                </div>`;
            }).join('');

            const winnerHtml = activeComp.finalWinner ? `
                <div class="flex flex-col justify-center items-center px-10">
                    <div class="text-center p-10 bg-white rounded-[3rem] shadow-2xl border-4 border-orange-400 winner-glow relative">
                        <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-20 h-20 bg-orange-500 rounded-full flex items-center justify-center shadow-xl border-4 border-white">
                            <i data-lucide="crown" class="text-white w-10 h-10"></i>
                        </div>
                        <h3 class="mt-4 text-orange-600 font-black tracking-widest uppercase text-[10px] mb-2">Champion 🎉</h3>
                        <p class="text-3xl md:text-5xl font-black text-slate-900 mb-2 truncate max-w-[200px]">${activeComp.finalWinner}</p>
                    </div>
                </div>` : '';

            container.innerHTML = `
                <div class="p-4 md:p-8 flex items-center justify-between mb-2 bg-white border-b border-orange-50 sticky left-0 z-40 no-export">
                    <h2 class="font-black text-orange-600 text-lg">🏆 ${activeComp.title}</h2>
                    <div class="flex items-center gap-2">
                        <button onclick="window.downloadCSV()" class="flex items-center gap-1.5 px-3 py-1.5 bg-orange-50 text-orange-600 rounded-lg text-xs font-bold hover:bg-orange-100 transition-all">
                            <i data-lucide="file-text" class="w-3.5 h-3.5"></i> CSV 저장
                        </button>
                        <button id="capture-btn" onclick="window.captureScreenshot(event)" class="flex items-center gap-1.5 px-3 py-1.5 bg-orange-500 text-white rounded-lg text-xs font-bold hover:bg-orange-600 transition-all shadow-md">
                            <i data-lucide="camera" class="w-3.5 h-3.5"></i> 이미지 저장
                        </button>
                    </div>
                </div>
                <div id="export-target" class="bg-[#fffaf5]">
                    <div id="bracket-area" class="relative p-6 md:p-12 min-w-max flex items-stretch gap-12 md:gap-24">
                        ${roundsHtml}
                        ${winnerHtml}
                    </div>
                </div>`;
            
            setTimeout(() => drawConnectors(), 100);
        }

        function renderMatchCard(match, rIdx, mIdx) {
            const isBye = match.p1 && !match.p2 && rIdx === 0;
            const renderSlot = (player, slotNum) => {
                const isWinner = match.winner === player && player;
                const isLoser = match.winner && match.winner !== player && player;
                const isEmpty = !player;
                const numDisplay = rIdx === 0 && player ? (mIdx * 2 + slotNum) : '';

                let cls = `h-12 md:h-14 flex items-center px-4 transition-all relative `;
                if (isEmpty) cls += `bg-orange-50/20 text-orange-200`;
                else if (isWinner) cls += `bg-orange-500 text-white font-black z-10 shadow-md scale-[1.05] rounded-lg`;
                else if (isLoser) cls += `bg-gray-50 text-gray-300 opacity-40`;
                else cls += `bg-white text-slate-700 cursor-pointer hover:bg-orange-50 active:ring-2 active:ring-orange-300`;

                const clickHandler = player && !match.winner 
                    ? `onclick="event.stopPropagation(); window.selectWinner(${rIdx}, ${mIdx}, '${player.replace(/'/g, "\\'")}')"` 
                    : '';

                return `
                    <div ${clickHandler} class="${cls}">
                        <span class="text-[10px] font-black w-6 opacity-30 no-export">${numDisplay}</span>
                        <span class="truncate flex-1 text-xs md:text-sm font-bold">${player || (isBye && slotNum === 2 ? '부전승 👉' : '-')}</span>
                        ${isWinner ? '<i data-lucide="check-circle-2" class="w-4 h-4 ml-1.5"></i>' : ''}
                    </div>
                `;
            };

            return `
                <div class="relative match-card" id="match-${rIdx}-${mIdx}">
                    <div class="w-[160px] md:w-56 rounded-2xl shadow-lg border border-orange-100 bg-white overflow-hidden divide-y divide-orange-50">
                        ${renderSlot(match.p1, 1)}
                        ${renderSlot(match.p2, 2)}
                    </div>
                    ${match.winner ? `
                        <button onclick="event.stopPropagation(); window.undoWinner(${rIdx}, ${mIdx})" class="no-export absolute -right-2 -top-2 w-7 h-7 bg-white text-orange-500 rounded-full shadow-lg border-2 border-orange-100 flex items-center justify-center hover:bg-orange-50 z-20">
                            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i>
                        </button>
                    ` : ''}
                </div>
            `;
        }

        window.downloadCSV = () => {
            if (!activeComp) return;
            let csvContent = "\uFEFF"; 
            csvContent += "라운드,경기ID,플레이어1,플레이어2,승자\n";
            activeComp.rounds.forEach((round, rIdx) => {
                round.forEach((match, mIdx) => {
                    csvContent += [`Round ${rIdx + 1}`, `Match ${mIdx + 1}`, match.p1 || "-", match.p2 || (rIdx === 0 && match.p1 ? "부전승" : "-"), match.winner || "-"].join(",") + "\n";
                });
            });
            if (activeComp.finalWinner) csvContent += `\n최종 우승자,${activeComp.finalWinner}\n`;
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${activeComp.title}_결과.csv`;
            link.click();
        };

        window.captureScreenshot = () => {
            const btn = document.getElementById('capture-btn');
            const target = document.getElementById('export-target');
            if (!target || !btn) return;

            document.body.classList.add('capturing');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> 생성 중...';
            lucide.createIcons();

            setTimeout(() => {
                html2canvas(target, {
                    backgroundColor: "#fffaf5",
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    onclone: (clonedDoc) => {
                        const ct = clonedDoc.getElementById('export-target');
                        if(ct) ct.style.padding = "40px";
                    }
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `${activeComp.title}_대진표.png`;
                    link.href = canvas.toDataURL('image/png', 1.0);
                    link.click();
                }).catch(err => console.error("Capture Error", err))
                .finally(() => {
                    document.body.classList.remove('capturing');
                    btn.innerHTML = originalText;
                    lucide.createIcons();
                });
            }, 500);
        };

        window.selectWinner = async (rIdx, mIdx, player) => {
            if (!activeComp) return;
            const newRounds = JSON.parse(JSON.stringify(activeComp.rounds));
            newRounds[rIdx][mIdx].winner = player;
            let finalWinner = activeComp.finalWinner;
            if (rIdx + 1 < newRounds.length) {
                const nextMIdx = Math.floor(mIdx / 2);
                if (mIdx % 2 === 0) newRounds[rIdx + 1][nextMIdx].p1 = player;
                else newRounds[rIdx + 1][nextMIdx].p2 = player;
            } else finalWinner = player;
            await updateDoc(getCompDoc(activeComp.id), { rounds: JSON.stringify(newRounds), finalWinner });
        };

        window.undoWinner = async (rIdx, mIdx) => {
            if (!activeComp) return;
            const winner = activeComp.rounds[rIdx][mIdx].winner;
            const newRounds = JSON.parse(JSON.stringify(activeComp.rounds));
            newRounds[rIdx][mIdx].winner = null;
            let cr = rIdx + 1, cm = Math.floor(mIdx / 2);
            while (cr < newRounds.length) {
                const m = newRounds[cr][cm];
                if (m.p1 === winner) m.p1 = null;
                if (m.p2 === winner) m.p2 = null;
                if (m.winner === winner) m.winner = null;
                else break;
                cm = Math.floor(cm / 2); cr++;
            }
            await updateDoc(getCompDoc(activeComp.id), { rounds: JSON.stringify(newRounds), finalWinner: activeComp.finalWinner === winner ? null : activeComp.finalWinner });
        };

        window.createCompetition = () => {
            showModal("새 경기 생성 🏆", `<input type="text" id="comp-title-input" class="w-full p-4 bg-orange-50 rounded-xl border-2 border-transparent focus:border-orange-400 outline-none font-bold" placeholder="경기 제목 입력">`, async () => {
                const title = document.getElementById('comp-title-input').value.trim();
                if (!title) return false;
                const id = "comp_" + Date.now();
                await setDoc(getCompDoc(id), { title, date: new Date().toLocaleDateString(), isActive: false, participants: [], rounds: "[]", finalWinner: null });
                return true;
            });
        };

        window.toggleActive = async (id) => {
            const batch = competitions.map(c => updateDoc(getCompDoc(c.id), { isActive: c.id === id ? !c.isActive : false }));
            await Promise.all(batch);
        };

        window.editParticipants = (id) => {
            const comp = competitions.find(c => c.id === id);
            showModal("명단 수정", `
                <div class="mb-2 text-right"><button onclick="window.fillSampleData()" class="text-[10px] bg-slate-200 px-2 py-1 rounded">예시 채우기</button></div>
                <textarea id="p-list" class="w-full h-48 p-4 bg-slate-50 border rounded-xl outline-none text-sm font-semibold" placeholder="한 줄에 한 명씩 이름을 입력하세요">${comp.participants.join('\n')}</textarea>
            `, async () => {
                const textarea = document.getElementById('p-list');
                const names = textarea.value.split('\n').map(n => n.trim()).filter(n => n);
                if (names.length < 2) return false;
                const rounds = generateRounds(names);
                await updateDoc(getCompDoc(id), { participants: names, rounds: JSON.stringify(rounds), finalWinner: null });
                return true;
            });
        };

        window.fillSampleData = () => { document.getElementById('p-list').value = ["강백호", "서태웅", "채치수", "송태섭", "정대만", "권준호", "이한나"].join('\n'); };

        function generateRounds(names) {
            const shuffled = [...names].sort(() => Math.random() - 0.5);
            let power = 1; while (power < shuffled.length) power *= 2;
            const numByes = power - shuffled.length;
            const r0 = []; let pIdx = 0;
            for (let i = 0; i < power / 2; i++) {
                const m = { p1: shuffled[pIdx++], p2: null, winner: null };
                if (pIdx <= shuffled.length - numByes) m.p2 = shuffled[pIdx++];
                r0.push(m);
            }
            const rounds = [r0]; let mc = r0.length / 2;
            while (mc >= 1) { rounds.push(Array.from({length: mc}, () => ({ p1: null, p2: null, winner: null }))); mc /= 2; }
            return rounds;
        }

        function showModal(title, contentHtml, onConfirm) {
            const overlay = document.getElementById('modal-overlay');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerHTML = contentHtml;
            overlay.classList.remove('hidden');
            document.getElementById('modal-confirm').onclick = async () => { if (await onConfirm()) overlay.classList.add('hidden'); };
            document.getElementById('modal-cancel').onclick = () => overlay.classList.add('hidden');
            if (window.lucide) lucide.createIcons();
        }

        function drawConnectors() {
            const area = document.getElementById('bracket-area');
            if (!area || !activeComp || !activeComp.rounds) return;
            document.querySelectorAll('.bracket-connector').forEach(c => c.remove());
            activeComp.rounds.forEach((round, rIdx) => {
                if (rIdx === activeComp.rounds.length - 1) return;
                round.forEach((match, mIdx) => {
                    const cur = document.getElementById(`match-${rIdx}-${mIdx}`);
                    const next = document.getElementById(`match-${rIdx+1}-${Math.floor(mIdx/2)}`);
                    if (!cur || !next) return;
                    const rectA = area.getBoundingClientRect(), r1 = cur.getBoundingClientRect(), r2 = next.getBoundingClientRect();
                    const x1 = r1.right - rectA.left, y1 = r1.top + r1.height / 2 - rectA.top;
                    const x2 = r2.left - rectA.left, y2 = r2.top + (mIdx % 2 === 0 ? r2.height * 0.25 : r2.height * 0.75) - rectA.top;
                    const midX = x1 + (x2 - x1) / 2;
                    createLine(area, x1, y1, midX - x1, 1.5, 'border-t-[1.5px]');
                    createLine(area, midX, Math.min(y1, y2), 1.5, Math.abs(y2 - y1), 'border-l-[1.5px]');
                    createLine(area, midX, y2, x2 - midX, 1.5, 'border-t-[1.5px]');
                });
            });
        }

        function createLine(p, x, y, w, h, cls) {
            const l = document.createElement('div');
            l.className = `bracket-connector ${cls}`;
            Object.assign(l.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
            p.appendChild(l);
        }

        document.getElementById('admin-btn').onclick = () => {
            if (isAdmin) { isAdmin = false; render(); return; }
            showModal("관리자 인증 🔒", `<input type="password" id="admin-pw" class="w-full p-4 bg-orange-50 rounded-xl text-center font-bold" placeholder="암호 입력">`, () => {
                const pwInput = document.getElementById('admin-pw');
                if (pwInput && pwInput.value === "33") { isAdmin = true; render(); return true; }
                return false;
            });
        };

        window.logoutAdmin = () => { isAdmin = false; render(); };
        
        // Final Execution
        initApp();
    </script>
</body>
</html>
